<style>
  :root {
    --bg: #f4efe6;
    --panel: rgba(255, 251, 245, 0.86);
    --panel-strong: #fffaf3;
    --border: rgba(61, 47, 31, 0.14);
    --text: #2d2319;
    --muted: #715f4b;
    --accent: #bc4b28;
    --accent-strong: #973a1d;
    --success: #2d7a55;
    --danger: #a0382d;
    --shadow: 0 22px 60px rgba(74, 49, 20, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(237, 187, 123, 0.26), transparent 28%),
      radial-gradient(circle at bottom right, rgba(202, 127, 77, 0.2), transparent 32%),
      linear-gradient(145deg, #f7f1e7 0%, #f0e6d6 50%, #eadfcd 100%);
    font-family: "Avenir Next", "Segoe UI", sans-serif;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  a {
    color: inherit;
  }

  .hidden {
    display: none !important;
  }

  .app-shell {
    padding: 32px 24px 40px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .topbar h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.05;
  }

  .lede {
    margin: 10px 0 0;
    max-width: 640px;
    color: var(--muted);
    font-size: 16px;
  }

  .topbar-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .ghost-button,
  .primary-button,
  .icon-button {
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }

  .ghost-button,
  .primary-button {
    padding: 12px 16px;
    text-decoration: none;
  }

  .ghost-button {
    background: rgba(255, 250, 243, 0.72);
    color: var(--text);
  }

  .primary-button {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
    border-color: transparent;
    color: #fff7f2;
  }

  .icon-button {
    width: 40px;
    height: 40px;
    background: var(--panel-strong);
    font-size: 24px;
    line-height: 1;
  }

  .ghost-button:hover,
  .primary-button:hover,
  .icon-button:hover {
    transform: translateY(-1px);
  }

  .status-banner {
    margin-bottom: 16px;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255, 250, 243, 0.84);
    box-shadow: var(--shadow);
  }

  .status-banner.error {
    border-color: rgba(160, 56, 45, 0.28);
    color: var(--danger);
  }

  .status-banner.success {
    border-color: rgba(45, 122, 85, 0.28);
    color: var(--success);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, minmax(280px, 1fr));
    gap: 20px;
    align-items: start;
  }

  .lane {
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--panel);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow);
    min-height: 480px;
    overflow: hidden;
  }

  .lane-header {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
  }

  .lane-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .lane h2 {
    margin: 0;
    font-size: 18px;
  }

  .lane-meta {
    color: var(--muted);
    font-size: 13px;
  }

  .lane-body {
    min-height: 280px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .lane-body.drag-over {
    background: rgba(188, 75, 40, 0.08);
  }

  .empty-state {
    padding: 20px;
    border: 1px dashed rgba(61, 47, 31, 0.18);
    border-radius: 18px;
    color: var(--muted);
    text-align: center;
  }

  .task-card {
    border: 1px solid rgba(61, 47, 31, 0.1);
    border-radius: 18px;
    background: var(--panel-strong);
    padding: 16px;
    box-shadow: 0 14px 28px rgba(74, 49, 20, 0.08);
    cursor: grab;
  }

  .task-card.dragging {
    opacity: 0.52;
    transform: rotate(1.4deg);
  }

  .task-card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .task-card h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.25;
  }

  .task-chip {
    flex: 0 0 auto;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(188, 75, 40, 0.12);
    color: var(--accent-strong);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .task-field {
    margin-bottom: 10px;
  }

  .task-label {
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .task-value {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14px;
    line-height: 1.45;
  }

  .task-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }

  .task-link {
    color: var(--accent-strong);
    text-decoration: underline;
  }

  .task-open {
    border: none;
    background: transparent;
    color: var(--accent-strong);
    cursor: pointer;
    font-weight: 700;
    padding: 0;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(40, 28, 18, 0.35);
    backdrop-filter: blur(10px);
  }

  .modal {
    width: min(720px, 100%);
    max-height: calc(100vh - 40px);
    overflow: auto;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: #fffaf4;
    box-shadow: 0 30px 80px rgba(40, 28, 18, 0.25);
    padding: 20px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .task-form {
    display: grid;
    gap: 14px;
  }

  .task-form label {
    display: grid;
    gap: 8px;
  }

  .task-form span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .task-form input,
  .task-form textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(61, 47, 31, 0.14);
    border-radius: 14px;
    background: #fffcf7;
    color: var(--text);
  }

  .task-form input[readonly],
  .task-form textarea[readonly] {
    background: #f2ece4;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 8px;
  }

  @media (max-width: 1080px) {
    .board {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .app-shell {
      padding: 20px 14px 28px;
    }

    .topbar {
      flex-direction: column;
    }

    .lane-body {
      padding: 12px;
    }

    .task-card {
      padding: 14px;
    }
  }
</style>
